{% extends 'base.html' %}

{% block content %}

<h1>Message in a Bottle</h1>
<p>Send anonymous messages and receive inspiration from strangers.</p>

<p>{{content}}</p>
<p class="bottledmessage"><img class='bottleimage' src="{{ url_for('static', filename='images/messageinbottle.png') }}"> {{message}}</p>
<a href="/submit"><button>Send a Message</button></a>

<div id="timer"></div>

{% endblock %}
